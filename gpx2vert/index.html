<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mkUltra.run gpx2vert analyser</title>
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            padding: 15px; 
            max-width: 900px; 
            margin: auto; 
            color: #333; 
            box-sizing: border-box; 
        }
        #output { 
            margin-top: 20px; 
            padding: 15px; 
            border: 1px solid #ccc; 
            background: #f9f9f9; 
            border-radius: 4px; 
            min-height: 20px; 
            line-height: 1.5; 
            font-size: 0.9rem;
            text-align: center;
        }
        #plot-area { 
            margin-top: 20px; 
            width: 100%; 
            display: flex; 
            justify-content: center;
            overflow-x: auto; 
        }
        #plot-area img, #plot-area svg {
            max-width: 100%;
            height: auto !important;
        }
        input[type="file"] { 
            margin: 10px 0; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            width: 100%; 
            box-sizing: border-box; 
            font-size: 1rem; 
        }
        h1 { border-bottom: 2px solid #333; padding-bottom: 10px; text-align: center; font-size: 1.6rem; }
        
        .view-mode-container {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            background: #fdfdfd;
            border: 1px solid #eee;
            border-radius: 8px;
        }
        .radio-group {
            display: inline-flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            margin-top: 5px;
        }
        .radio-option {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        py-config { display: none !important; }
        .loading { font-style: italic; color: #666; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <h1>mkUltra.run gpx2vert analyser</h1>
    <p style="text-align: center; color: gray; font-size: 0.9rem;">Upload a GPX file to see your distance breakdown by gradient.</p>
    
    <input type="file" id="file-upload" accept=".gpx">
    
    <div id="view-mode-container" class="view-mode-container" style="display: none;">
        <div style="font-weight: bold; margin-bottom: 5px;">View Metric:</div>
        <div class="radio-group">
            <label class="radio-option">
                <input type="radio" name="metric" value="km" checked> km
            </label>
            <label class="radio-option">
                <input type="radio" name="metric" value="mi"> mi
            </label>
            <label class="radio-option">
                <input type="radio" name="metric" value="perc"> %
            </label>
        </div>
    </div>

    <div id="output">
        <span class="loading">Initialising mkUltra engine... Loading analysis libraries.</span>
    </div>

    <div id="plot-area"></div>

    <py-config>
        packages = ["pandas", "gpxpy", "numpy", "matplotlib"]
        [[fetch]]
        files = ["Logo.png"]
    </py-config>

    <script type="py">
        from pyscript import display, when, document
        import gpxpy
        import pandas as pd
        import numpy as np
        import matplotlib.pyplot as plt
        from matplotlib.colors import LinearSegmentedColormap
        from matplotlib.offsetbox import OffsetImage, AnnotationBbox
        import re
        import os

        # State management
        state = {
            "summary_df": None,
            "total_dist_km": 0,
            "race_name": "",
            "metric": "km"
        }

        KM_TO_MI = 0.621371
        SMOOTHING_WINDOW = 10
        CUSTOM_COLORS = ["#803131", "#d63131", "#e77d31", "#efe331", "#d3d388", "#31d431", "#7fd1af", "#4ee6e6", "#3197e9", "#3b36db", "#682d94"]
        
        display("✅ mkUltra engine ready. Please select your GPX file.", target="output", append=False)

        def draw_chart():
            if state["summary_df"] is None:
                return

            plt.close('all')
            fig, ax = plt.subplots(figsize=(10, 8))
            
            summary = state["summary_df"].copy()
            metric = state["metric"]
            
            # Determine values and labels based on metric
            if metric == "perc":
                vals = summary['Perc']
                unit = "%"
                xlabel = "Percentage of Total Distance (%)"
            elif metric == "mi":
                vals = summary['Distance_km'] * KM_TO_MI
                unit = "mi"
                xlabel = "Distance (miles)"
            else:
                vals = summary['Distance_km']
                unit = "km"
                xlabel = "Distance (km)"

            cmap = LinearSegmentedColormap.from_list("vv", CUSTOM_COLORS[::-1], N=len(summary))
            bars = ax.barh(summary['Bin'], vals, color=[cmap(i) for i in range(len(summary))])

            max_val = vals.max()
            ax.set_xlim(0, max_val * 1.3)
            
            for i, bar in enumerate(bars):
                val = vals.iloc[i]
                if val > 0:
                    ax.text(bar.get_width() + (max_val * 0.02), bar.get_y() + bar.get_height()/2, 
                            f"{val:.2f}{unit}", va='center', fontweight='bold', fontsize=10)

            # Logo handling
            if os.path.exists("Logo.png"):
                try:
                    logo_img = plt.imread("Logo.png")
                    imagebox = OffsetImage(logo_img, zoom=0.15, alpha=0.8)
                    ab = AnnotationBbox(imagebox, (0.98, 0.05), xycoords='axes fraction', frameon=False, box_alignment=(1, 0))
                    ax.add_artist(ab)
                except: pass

            title_dist = state['total_dist_km'] if metric != "mi" else state['total_dist_km'] * KM_TO_MI
            title_unit = "km" if metric != "mi" else "mi"
            
            plt.title(f"{state['race_name']}\nTotal Distance: {title_dist:.2f} {title_unit}", fontsize=14, fontweight='bold')
            plt.xlabel(xlabel)
            plt.tight_layout()
            
            display(fig, target="plot-area", append=False)
            document.getElementById("view-mode-container").style.display = "block"

        @when("change", "#file-upload")
        async def process_file(event):
            file_list = event.target.files
            if not file_list: return
            
            display("⏳ Analysing gradients...", target="output", append=False)
            file = file_list.item(0)
            state["race_name"] = file.name.replace(".gpx", "")
            
            try:
                array_buf = await file.arrayBuffer()
                content = array_buf.to_bytes()
                gpx_data = content.decode("utf-8")
                gpx = gpxpy.parse(gpx_data)
                
                cumulative_dist, elevations, points = [0.0], [], []
                for track in gpx.tracks:
                    for segment in track.segments:
                        points.extend(segment.points)

                for i, point in enumerate(points):
                    elevations.append(point.elevation or 0.0)
                    if i > 0:
                        dist = points[i-1].distance_2d(point)
                        cumulative_dist.append(cumulative_dist[-1] + dist)

                df = pd.DataFrame({'cum_dist': cumulative_dist, 'ele': elevations})
                df['ele_smooth'] = df['ele'].rolling(window=SMOOTHING_WINDOW, center=True, min_periods=1).mean()
                df['dist_diff'] = df['cum_dist'].diff().fillna(0)
                df['ele_diff'] = df['ele_smooth'].diff().fillna(0)
                
                df['gradient'] = np.where(df['dist_diff'] > 0.5, (df['ele_diff'] / df['dist_diff']) * 100, 0)
                
                bins = [-np.inf, -22.5, -17.5, -12.5, -7.5, -2.5, 2.5, 7.5, 12.5, 17.5, 22.5, np.inf]
                labels = ["-27.5 to -22.5 %", "-22.5 to -17.5 %", "-17.5 to -12.5 %", "-12.5 to -7.5 %", "-7.5 to -2.5 %", "-2.5 to 2.5 %", "2.5 to 7.5 %", "7.5 to 12.5 %", "12.5 to 17.5 %", "17.5 to 22.5 %", "22.5 to 27.5 %"]
                
                df['Bin'] = pd.cut(df['gradient'], bins=bins, labels=labels, right=False)
                summary = df.groupby('Bin', observed=False)['dist_diff'].sum().reset_index()
                summary.rename(columns={'dist_diff': 'Distance_km'}, inplace=True)
                summary['Distance_km'] = summary['Distance_km'] / 1000.0
                
                state["total_dist_km"] = df['cum_dist'].max() / 1000.0
                summary['Perc'] = (summary['Distance_km'] / state["total_dist_km"] * 100) if state["total_dist_km"] > 0 else 0
                summary['sort'] = summary['Bin'].apply(lambda x: float(re.findall(r"[-+]?\d*\.?\d+", str(x))[0]))
                
                state["summary_df"] = summary.sort_values('sort').reset_index(drop=True)
                
                draw_chart()
                display(f"✅ Analysis complete for {state['race_name']}", target="output", append=False)
                
            except Exception as e:
                display(f"❌ Error: {str(e)}", target="output", append=False)

        @when("change", "input[name='metric']")
        def change_metric(event):
            state["metric"] = event.target.value
            draw_chart()
    </script>
</body>
</html>
