<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mkUltra.run | GPX Vert Comparison</title>
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            padding: 10px; 
            max-width: 100%; 
            margin: auto; 
            color: #333; 
            box-sizing: border-box; 
            overflow-x: hidden;
        }
        .header { text-align: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px;}
        h1 { font-size: 1.8rem; margin-bottom: 5px; }
        .subtitle { color: gray; font-size: 0.9rem; font-style: italic; margin-top: 0; }
        
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        
        .upload-box { display: flex; flex-direction: column; }
        .upload-box label { font-weight: bold; margin-bottom: 5px; color: #444; }
        
        input[type="file"], select { 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            width: 100%; 
            box-sizing: border-box; 
            font-size: 1rem; 
            background: white;
        }

        .view-mode-container {
            text-align: center;
            margin-top: 25px;
            padding: 15px;
            background: #fdfdfd;
            border-top: 1px solid #eee;
        }

        #output { 
            text-align: center;
            padding: 10px; 
            margin-bottom: 20px;
            font-weight: bold;
            color: #d63131;
            min-height: 24px;
        }
        
        #plot-area { 
            width: 100%; 
            display: flex; 
            justify-content: center;
            min-height: 400px;
        }

        #plot-area svg {
            max-width: 100% !important;
            height: auto !important;
            display: block;
            margin: 0 auto;
        }

        py-config { display: none !important; }
        .loading { font-style: italic; color: #666; animation: pulse 2s infinite; font-weight: normal;}
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>GPXcompare by mkUltra.run</h1>
        <p class="subtitle">Upload two GPX files to compare gradient profiles. Best viewed on a tablet or desktop computer.</p>
    </div>

    <div class="controls-grid">
        <div class="upload-box">
            <label for="file-a">🏃 GPX File A (Left)</label>
            <input type="file" id="file-a" accept=".gpx">
        </div>
        <div class="upload-box">
            <label for="file-b">🏃 GPX File B (Right)</label>
            <input type="file" id="file-b" accept=".gpx">
        </div>
    </div>
    
    <div id="output">
        <span class="loading">Initialising mkUltra engine...</span>
    </div>

    <div id="plot-area"></div>

    <div id="view-mode-container" class="view-mode-container" style="display: none;">
        <label for="view-mode" style="font-weight: bold; margin-right: 10px;">Comparison Metric:</label>
        <select id="view-mode" style="width: auto; min-width: 200px; display: inline-block;">
            <option value="km">Distance (km)</option>
            <option value="perc">Percentage (%)</option>
        </select>
    </div>

    <py-config>
        packages = ["pandas", "gpxpy", "numpy", "matplotlib"]
        [[fetch]]
        files = ["Logo.png"]
    </py-config>

    <script type="py">
        from pyscript import display, when, document
        import gpxpy
        import pandas as pd
        import numpy as np
        import matplotlib.pyplot as plt
        from matplotlib.colors import LinearSegmentedColormap
        from matplotlib.offsetbox import OffsetImage, AnnotationBbox
        import re
        import os

        state = {
            "df_a": None, "name_a": "Race A", "dist_a": 0,
            "df_b": None, "name_b": "Race B", "dist_b": 0,
            "metric": "km"
        }

        SMOOTHING_WINDOW = 10
        BINS = [-np.inf, -22.5, -17.5, -12.5, -7.5, -2.5, 2.5, 7.5, 12.5, 17.5, 22.5, np.inf]
        LABELS = ["-27.5 to -22.5 %", "-22.5 to -17.5 %", "-17.5 to -12.5 %", "-12.5 to -7.5 %", "-7.5 to -2.5 %", "-2.5 to 2.5 %", "2.5 to 7.5 %", "7.5 to 12.5 %", "12.5 to 17.5 %", "17.5 to 22.5 %", "22.5 to 27.5 %"]
        CUSTOM_COLORS = ["#803131", "#d63131", "#e77d31", "#efe331", "#d3d388", "#31d431", "#7fd1af", "#4ee6e6", "#3197e9", "#3b36db", "#682d94"]

        display("✅ Engine ready. Upload both GPX files to generate the comparison.", target="output", append=False)

        def process_gpx_data(gpx_data):
            gpx = gpxpy.parse(gpx_data)
            cumulative_dist, elevations, points = [0.0], [], []
            
            for track in gpx.tracks:
                for segment in track.segments:
                    points.extend(segment.points)

            for i, point in enumerate(points):
                elevations.append(point.elevation or 0.0)
                if i > 0:
                    dist = points[i-1].distance_2d(point)
                    cumulative_dist.append(cumulative_dist[-1] + dist)

            df = pd.DataFrame({'cum_dist': cumulative_dist, 'ele': elevations})
            df['ele_smooth'] = df['ele'].rolling(window=SMOOTHING_WINDOW, center=True, min_periods=1).mean()
            df['dist_diff'] = df['cum_dist'].diff().fillna(0)
            df['ele_diff'] = df['ele_smooth'].diff().fillna(0)
            
            df['gradient'] = np.where(df['dist_diff'] > 0.5, (df['ele_diff'] / df['dist_diff']) * 100, 0)
            df['gradient'] = df['gradient'].replace([np.inf, -np.inf], 0).fillna(0)

            df['Bin'] = pd.cut(df['gradient'], bins=BINS, labels=LABELS, right=False)
            summary = df.groupby('Bin', observed=False)['dist_diff'].sum().reset_index()
            summary.rename(columns={'dist_diff': 'Distance_km'}, inplace=True)
            summary['Distance_km'] = summary['Distance_km'] / 1000.0
            
            total_dist = df['cum_dist'].max() / 1000.0
            summary['Perc'] = (summary['Distance_km'] / total_dist * 100) if total_dist > 0 else 0
            summary['sort'] = summary['Bin'].apply(lambda x: float(re.findall(r"[-+]?\d*\.?\d+", str(x))[0]))
            
            return summary.sort_values('sort').reset_index(drop=True), total_dist

        def draw_chart():
            if state["df_a"] is None or state["df_b"] is None:
                return

            plt.close('all')
            fig, ax = plt.subplots(figsize=(10, 8))
            
            x_col = 'Distance_km' if state["metric"] == "km" else 'Perc'
            unit = "km" if state["metric"] == "km" else "%"

            merged = pd.merge(state["df_a"][['Bin', x_col, 'sort']], state["df_b"][['Bin', x_col]], on='Bin', how='outer', suffixes=('_a', '_b')).fillna(0)
            merged['delta'] = merged[f'{x_col}_b'] - merged[f'{x_col}_a']
            merged = merged.sort_values('sort').reset_index(drop=True)

            cmap = LinearSegmentedColormap.from_list("vv", CUSTOM_COLORS[::-1], N=len(LABELS))
            colors = [cmap(i) for i in range(len(LABELS))]
            y_pos = np.arange(len(merged))

            ax.barh(y_pos, -merged[f'{x_col}_a'], color=colors, height=0.7)
            ax.barh(y_pos, merged[f'{x_col}_b'], color=colors, height=0.7)

            max_val = max(merged[f'{x_col}_a'].max(), merged[f'{x_col}_b'].max())
            axis_range = max_val * 1.6
            ax.set_xlim(-axis_range, axis_range)
            ax.set_yticks(y_pos)
            ax.set_yticklabels(merged['Bin'], fontweight='bold')

            for i in range(len(merged)):
                val_a = merged.loc[i, f'{x_col}_a']
                val_b = merged.loc[i, f'{x_col}_b']
                delta = merged.loc[i, 'delta']

                if val_a > 0.01:
                    ax.text(-val_a - (max_val * 0.02), i, f"{val_a:.1f}{unit}", va='center', ha='right', fontsize=9)
                if val_b > 0.01:
                    ax.text(val_b + (max_val * 0.02), i, f"{val_b:.1f}{unit}", va='center', ha='left', fontsize=9)

                if delta > 0.001:
                    color = "#d63131"
                    prefix = "+"
                elif delta < -0.001:
                    color = "#3197e9"
                    prefix = ""
                else:
                    color = "#888888"
                    prefix = ""
                
                ax.text(axis_range * 0.95, i, f"{prefix}{delta:.1f}{unit}", va='center', ha='right', color=color, fontweight='bold', fontsize=10)

            ax.text(-axis_range * 0.5, len(merged), f"{state['name_a']}\n{state['dist_a']:.1f} km", ha='center', va='bottom', fontsize=12, fontweight='bold')
            ax.text(axis_range * 0.5, len(merged), f"{state['name_b']}\n{state['dist_b']:.1f} km", ha='center', va='bottom', fontsize=12, fontweight='bold')
            ax.text(axis_range * 0.95, len(merged), "Difference", ha='right', va='bottom', fontsize=10, fontweight='bold', color='#555')

            ax.spines['top'].set_visible(False)
            ax.spines['right'].set_visible(False)
            ax.spines['left'].set_visible(False)
            ax.xaxis.set_visible(False)
            ax.tick_params(axis='y', which='both', length=0)
            ax.axvline(0, color='black', linewidth=1)

            if os.path.exists("Logo.png"):
                try:
                    logo_img = plt.imread("Logo.png")
                    imagebox = OffsetImage(logo_img, zoom=0.15, alpha=0.8)
                    ab = AnnotationBbox(imagebox, (0.02, 0.05), xycoords='axes fraction', frameon=False, box_alignment=(0, 0))
                    ax.add_artist(ab)
                except: pass

            plt.tight_layout()
            display(fig, target="plot-area", append=False)
            
            svg_el = document.querySelector("#plot-area svg")
            if svg_el:
                svg_el.style.width = "100%"
                svg_el.style.height = "auto"

            document.getElementById("view-mode-container").style.display = "block"
            display("✅ Comparison complete.", target="output", append=False)

        @when("change", "#file-a")
        async def load_a(event):
            file_list = event.target.files
            if not file_list: return
            display("⏳ Parsing Race A...", target="output", append=False)
            file = file_list.item(0)
            state["name_a"] = file.name.replace(".gpx", "")
            content = await file.text()
            state["df_a"], state["dist_a"] = process_gpx_data(content)
            if state["df_b"] is not None: draw_chart()
            else: display(f"✅ Race A loaded. Waiting for Race B...", target="output", append=False)

        @when("change", "#file-b")
        async def load_b(event):
            file_list = event.target.files
            if not file_list: return
            display("⏳ Parsing Race B...", target="output", append=False)
            file = file_list.item(0)
            state["name_b"] = file.name.replace(".gpx", "")
            content = await file.text()
            state["df_b"], state["dist_b"] = process_gpx_data(content)
            if state["df_a"] is not None: draw_chart()
            else: display(f"✅ Race B loaded. Waiting for Race A...", target="output", append=False)

        @when("change", "#view-mode")
        def change_view(event):
            state["metric"] = document.getElementById("view-mode").value
            if state["df_a"] is not None and state["df_b"] is not None:
                draw_chart()
    </script>
</body>
</html>
